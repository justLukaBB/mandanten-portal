services:
  # Backend Server
  - type: web
    name: mandanten-portal-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ZENDESK_SUBDOMAIN
        sync: false
      - key: ZENDESK_EMAIL
        sync: false
      - key: ZENDESK_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 10000

  # Legacy Frontend (CRA — Client Portal)
  - type: web
    name: mandanten-portal-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # New Frontend (Vite — Admin Portal)
  - type: web
    name: app-rasolv
    env: static
    rootDir: MandantenPortalDesign
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mandanten-portal-docker.onrender.com
      - key: VITE_PORTAL_URL
        value: https://mandanten-portal-frontend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html